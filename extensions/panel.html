<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>한양대 LMS 알리미</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
    }

    .hidden { display: none !important; }

    /* ─── Login View ──────────────────────── */
    #login-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 500px;
      gap: 36px;
      padding: 40px;
    }

    .login-logo {
      text-align: center;
    }

    .login-logo .logo-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.4;
    }

    .login-logo .logo-sub {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
      letter-spacing: 0.8px;
    }

    #kakao-login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #FEE500;
      border: none;
      border-radius: 10px;
      padding: 13px 24px;
      font-size: 15px;
      font-weight: 600;
      color: #3C1E1E;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #kakao-login-btn:hover { background: #f5db00; }
    #kakao-login-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .kakao-icon { width: 22px; height: 22px; flex-shrink: 0; }

    /* ─── Main View ───────────────────────── */
    #main-view {
      display: flex;
      flex-direction: column;
      min-height: 500px;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #fff;
      border-bottom: 1px solid #ebebeb;
      padding: 14px 16px;
    }

    .main-header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
    }

    #sync-btn {
      position: absolute;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
      background: #0062cc;
      border: none;
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #sync-btn:hover { background: #0052aa; }
    #sync-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .main-content {
      flex: 1;
      padding: 20px 16px;
    }
  </style>
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-view">
    <div class="login-logo">
      <div class="logo-title">한양대 LMS 알리미</div>
      <div class="logo-sub">HYU LMS Notifier</div>
    </div>
    <button id="kakao-login-btn">
      <svg class="kakao-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.636 5.07 4.13 6.47L5.1 20.4c-.1.3.23.55.5.37l4.22-2.81c.71.1 1.44.15 2.18.15 5.523 0 10-3.477 10-7.8C22 6.477 17.523 3 12 3z" fill="#3C1E1E"/>
      </svg>
      카카오 로그인
    </button>
  </div>

  <!-- 메인 화면 -->
  <div id="main-view" class="hidden">
    <header class="main-header">
      <h1>한양대 LMS 알리미</h1>
      <button id="sync-btn">⟳ LMS 동기화</button>
    </header>
    <main class="main-content">
      <!-- 추후 알림/과제 목록 -->
    </main>
  </div>

  <script src="panel.js"></script>
</body>
</html>
