<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한양대 노티파이어</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
    }

    .hidden { display: none !important; }

    /* ─── Login View ──────────────────────── */
    #login-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: clamp(20px, 6vh, 36px);
      padding: clamp(24px, 8vw, 48px);
    }

    .login-logo { text-align: center; }

    .login-logo .logo-title {
      font-size: clamp(18px, 5vw, 22px);
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.4;
    }

    .login-logo .logo-sub {
      font-size: clamp(11px, 3vw, 13px);
      color: #999;
      margin-top: 6px;
      letter-spacing: 0.8px;
    }

    #kakao-login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #FEE500;
      border: none;
      border-radius: 10px;
      padding: clamp(11px, 3vh, 14px) 24px;
      font-size: clamp(14px, 4vw, 16px);
      font-weight: 600;
      color: #3C1E1E;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #kakao-login-btn:hover { background: #f5db00; }
    #kakao-login-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .kakao-icon { width: 22px; height: 22px; flex-shrink: 0; }

    /* ─── Needs Sync View ────────────────── */
    #needs-sync-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: clamp(12px, 3vh, 20px);
      padding: clamp(24px, 8vw, 48px);
      text-align: center;
    }

    #needs-sync-view .sync-icon {
      font-size: clamp(36px, 10vw, 52px);
    }

    #needs-sync-view h2 {
      font-size: clamp(15px, 4.5vw, 18px);
      font-weight: 700;
      color: #1a1a2e;
    }

    #needs-sync-view p {
      font-size: clamp(12px, 3.5vw, 14px);
      color: #666;
      line-height: 1.6;
    }

    #lms-confirm-btn {
      width: 100%;
      margin-top: clamp(6px, 2vh, 12px);
      padding: clamp(11px, 3vh, 14px) 24px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: clamp(13px, 4vw, 15px);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #lms-confirm-btn:hover { background: #0d47a1; }

    /* ─── Main View ───────────────────────── */
    #main-view {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #fff;
      border-bottom: 1px solid #ebebeb;
      padding: clamp(12px, 3vh, 16px) clamp(12px, 4vw, 20px);
    }

    .main-header h1 {
      font-size: clamp(13px, 4vw, 16px);
      font-weight: 700;
      color: #1a1a2e;
    }

    #sync-btn {
      position: absolute;
      right: clamp(10px, 3vw, 16px);
      display: flex;
      align-items: center;
      gap: 5px;
      background: #0062cc;
      border: none;
      border-radius: 7px;
      padding: clamp(5px, 1.5vh, 8px) clamp(8px, 2.5vw, 14px);
      font-size: clamp(11px, 3vw, 13px);
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #sync-btn:hover { background: #0052aa; }
    #sync-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .main-content {
      flex: 1;
      padding: clamp(14px, 4vh, 24px) clamp(12px, 4vw, 20px);
    }
  </style>
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-view">
    <div class="login-logo">
      <div class="logo-title">한양대 노티파이어</div>
      <div class="logo-sub">HYU LMS Notifier</div>
    </div>
    <button id="kakao-login-btn">
      <svg class="kakao-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.636 5.07 4.13 6.47L5.1 20.4c-.1.3.23.55.5.37l4.22-2.81c.71.1 1.44.15 2.18.15 5.523 0 10-3.477 10-7.8C22 6.477 17.523 3 12 3z" fill="#3C1E1E"/>
      </svg>
      카카오 로그인
    </button>
  </div>

  <!-- LMS 동기화 안내 화면 -->
  <div id="needs-sync-view" class="hidden">
    <div class="sync-icon">🎓</div>
    <h2>한양대 LMS 동기화 필요</h2>
    <p>한양대 LMS에 로그인하면 강의 일정을<br>자동으로 캘린더에 동기화할 수 있습니다.</p>
    <button id="lms-confirm-btn">확인 (LMS로 이동)</button>
  </div>

  <!-- 메인 화면 -->
  <div id="main-view" class="hidden">
    <header class="main-header">
      <h1>한양대 노티파이어</h1>
      <button id="sync-btn">⟳ Sync</button>
    </header>
    <main class="main-content">
      <!-- 추후 알림/과제 목록 -->
    </main>
  </div>

  <script src="panel.js"></script>
</body>
</html>
